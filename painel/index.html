<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin â€” NEODONTO</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --teal: #0ABFBC;
  --teal2: #0891B2;
  --navy: #0A1628;
  --card: #111E30;
  --card2: #162236;
  --border: rgba(10,191,188,0.15);
  --text: #E8F4F8;
  --muted: #6A8FA8;
  --danger: #FF5C7A;
  --warn: #F5A623;
  --green: #2ECC71;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--navy);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  min-height: 100vh;
}

/* LOGIN */
.login-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: radial-gradient(ellipse at 30% 20%, rgba(10,191,188,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 80%, rgba(8,145,178,0.06) 0%, transparent 50%),
              var(--navy);
}
.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 40px 32px;
  width: 100%;
  max-width: 380px;
  text-align: center;
}
.login-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.8rem;
  letter-spacing: 3px;
  color: var(--teal);
  margin-bottom: 4px;
}
.login-sub { font-size: 0.8rem; color: var(--muted); letter-spacing: 1px; margin-bottom: 32px; }
.login-card input {
  width: 100%;
  background: rgba(10,191,188,0.05);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  margin-bottom: 12px;
  outline: none;
  transition: border-color 0.2s;
}
.login-card input:focus { border-color: var(--teal); }
.login-card input::placeholder { color: var(--muted); }
.login-btn {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, var(--teal), var(--teal2));
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: 'Syne', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: opacity 0.2s;
}
.login-btn:hover { opacity: 0.88; }
.login-err { color: var(--danger); font-size: 0.82rem; margin-top: 10px; }

/* DASHBOARD */
.dash { display: none; min-height: 100vh; }

.sidebar {
  position: fixed;
  top: 0; left: 0;
  width: 220px;
  height: 100vh;
  background: var(--card);
  border-right: 1px solid var(--border);
  padding: 28px 16px;
  z-index: 100;
  display: flex;
  flex-direction: column;
}
.s-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.3rem;
  letter-spacing: 2px;
  color: var(--teal);
  margin-bottom: 2px;
  padding: 0 8px;
}
.s-sub { font-size: 0.7rem; color: var(--muted); padding: 0 8px; margin-bottom: 28px; letter-spacing: 1px; }
.s-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; padding: 0 8px; margin-bottom: 8px; }
.s-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 0.88rem;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 4px;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}
.s-btn:hover, .s-btn.active { background: rgba(10,191,188,0.1); color: var(--text); }
.s-btn.active { color: var(--teal); }
.s-icon { font-size: 1rem; width: 20px; text-align: center; }
.s-spacer { flex: 1; }
.s-logout {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 0.85rem;
  color: var(--danger);
  cursor: pointer;
  border: none; background: none; width: 100%;
}
.s-logout:hover { background: rgba(255,92,122,0.08); }

.main { margin-left: 220px; padding: 28px 24px; min-height: 100vh; }

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
}
.topbar-title { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 700; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.search-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  outline: none;
  width: 220px;
  transition: border-color 0.2s;
}
.search-box:focus { border-color: var(--teal); }
.search-box::placeholder { color: var(--muted); }
.refresh-btn {
  background: rgba(10,191,188,0.1);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  color: var(--teal);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
}
.refresh-btn:hover { background: rgba(10,191,188,0.2); }

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: -20px; right: -20px;
  width: 80px; height: 80px;
  border-radius: 50%;
  background: rgba(10,191,188,0.06);
}
.stat-icon { font-size: 1.4rem; margin-bottom: 12px; }
.stat-val {
  font-family: 'Syne', sans-serif;
  font-size: 2rem;
  font-weight: 800;
  color: var(--teal);
  line-height: 1;
}
.stat-label { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

.table-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
}
.table-header {
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.table-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
.badge {
  background: rgba(10,191,188,0.12);
  color: var(--teal);
  border-radius: 99px;
  padding: 3px 10px;
  font-size: 0.75rem;
  font-weight: 600;
}

table { width: 100%; border-collapse: collapse; }
thead th {
  padding: 12px 16px;
  font-size: 0.72rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  font-weight: 500;
}
tbody tr {
  border-bottom: 1px solid rgba(10,191,188,0.06);
  transition: background 0.15s;
  cursor: pointer;
}
tbody tr:hover { background: rgba(10,191,188,0.04); }
tbody tr:last-child { border-bottom: none; }
td { padding: 13px 16px; font-size: 0.88rem; vertical-align: middle; }
.td-name { font-weight: 500; color: var(--text); }
.td-muted { color: var(--muted); font-size: 0.82rem; }
.td-tag {
  display: inline-block;
  background: rgba(10,191,188,0.1);
  color: var(--teal);
  border-radius: 6px;
  padding: 2px 8px;
  font-size: 0.75rem;
  margin: 2px;
}
.td-tag.warn { background: rgba(245,166,35,0.12); color: var(--warn); }
.td-tag.danger { background: rgba(255,92,122,0.1); color: var(--danger); }
.view-btn {
  background: rgba(10,191,188,0.1);
  border: none;
  border-radius: 8px;
  padding: 6px 12px;
  color: var(--teal);
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
}
.view-btn:hover { background: rgba(10,191,188,0.2); }

.loading { text-align: center; padding: 60px; color: var(--muted); font-size: 0.9rem; }
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--teal);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  padding: 20px;
  overflow-y: auto;
  backdrop-filter: blur(4px);
}
.modal-bg.open { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  width: 100%;
  max-width: 600px;
  overflow: hidden;
  animation: modalIn 0.3s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(-20px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-head {
  background: linear-gradient(135deg, var(--teal), var(--teal2));
  padding: 24px;
  position: relative;
}
.modal-name { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 700; color: #fff; }
.modal-date { font-size: 0.8rem; color: rgba(255,255,255,0.7); margin-top: 4px; }
.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  background: rgba(255,255,255,0.15);
  border: none;
  border-radius: 8px;
  width: 32px; height: 32px;
  color: #fff;
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.modal-body { padding: 24px; }
.m-section { margin-bottom: 20px; }
.m-section-title {
  font-size: 0.72rem;
  color: var(--teal);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 600;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.m-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.m-tag {
  background: rgba(10,191,188,0.08);
  border: 1px solid rgba(10,191,188,0.15);
  color: var(--text);
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 0.82rem;
}
.m-tag.red { background: rgba(255,92,122,0.08); border-color: rgba(255,92,122,0.2); color: var(--danger); }
.m-tag.yellow { background: rgba(245,166,35,0.08); border-color: rgba(245,166,35,0.2); color: var(--warn); }
.m-tag.green { background: rgba(46,204,113,0.08); border-color: rgba(46,204,113,0.2); color: var(--green); }
.m-empty { color: var(--muted); font-size: 0.85rem; font-style: italic; }

.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty h3 { font-family: 'Syne', sans-serif; font-size: 1rem; color: var(--text); margin-bottom: 6px; }
.empty p { font-size: 0.85rem; }


/* Filtros de motivo */
.filtros-wrap {
  margin-bottom: 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
}
.filtros-label {
  font-size: 0.75rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-right: 4px;
  white-space: nowrap;
}
.filtro-btn {
  padding: 6px 14px;
  border-radius: 99px;
  border: 1px solid var(--border);
  background: var(--card2);
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.filtro-btn:hover { border-color: var(--teal); color: var(--text); }
.filtro-btn.ativo {
  background: var(--teal);
  border-color: var(--teal);
  color: #fff;
  font-weight: 500;
}
.filtro-count {
  display: inline-block;
  background: rgba(255,255,255,0.2);
  border-radius: 99px;
  padding: 1px 7px;
  font-size: 0.72rem;
  margin-left: 4px;
}
/* Foto paciente */
.avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--border);
  background: var(--card2);
  flex-shrink: 0;
}
.avatar-placeholder {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--card2);
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
}
.td-paciente { display: flex; align-items: center; gap: 10px; }

/* Foto grande no modal */
.modal-avatar {
  width: 80px; height: 80px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.1);
  position: absolute;
  top: 20px; right: 20px;
}
.modal-avatar-placeholder {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: 3px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem;
  position: absolute;
  top: 20px; right: 20px;
}

@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 16px; }
  .stats { grid-template-columns: 1fr 1fr; }
  .search-box { width: 150px; }
}

/* ImpressÃ£o */
.print-btn {
  background: rgba(46,204,113,0.12);
  border: 1px solid rgba(46,204,113,0.3);
  border-radius: 10px;
  padding: 8px 16px;
  color: #2ECC71;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.print-btn:hover { background: rgba(46,204,113,0.22); }
.pdf-btn {
  background: rgba(220,38,38,0.12);
  border: 1px solid rgba(220,38,38,0.3);
  border-radius: 10px;
  padding: 8px 16px;
  color: #FF5C7A;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.pdf-btn:hover { background: rgba(220,38,38,0.22); }
.modal-actions {
  display: flex;
  gap: 10px;
  padding: 0 24px 24px;
}

@media print {
  body * { visibility: hidden !important; }
  .print-area, .print-area * { visibility: visible !important; }
  .print-area {
    position: fixed !important;
    inset: 0 !important;
    background: #fff !important;
    color: #111 !important;
    padding: 32px !important;
    font-family: Arial, sans-serif !important;
    font-size: 13px !important;
  }
  .print-area h1 { color: #0ABFBC; font-size: 1.4rem; margin-bottom: 4px; }
  .print-area h2 { font-size: 1rem; color: #333; margin: 16px 0 8px; border-bottom: 1px solid #eee; padding-bottom: 4px; }
  .print-area .p-row { display: flex; gap: 8px; margin-bottom: 6px; flex-wrap: wrap; }
  .print-area .p-label { font-weight: bold; color: #555; min-width: 140px; }
  .print-area .p-tag { background: #f0f0f0; border-radius: 4px; padding: 2px 8px; font-size: 12px; margin: 2px; display: inline-block; }
  .print-area .p-tag.red { background: #fee2e2; color: #dc2626; }
  .print-area .p-tag.yellow { background: #fef3c7; color: #d97706; }
  .print-area .p-tag.green { background: #dcfce7; color: #16a34a; }
  .print-area .p-foto { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; float: right; margin: 0 0 12px 16px; border: 2px solid #0ABFBC; }
  .print-area .p-header { overflow: hidden; margin-bottom: 16px; border-bottom: 2px solid #0ABFBC; padding-bottom: 12px; }
  .no-print { display: none !important; }
}
</style>

</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-logo">NEODONTO</div>
    <div class="login-sub">PAINEL ADMINISTRATIVO</div>
    <input type="email" id="loginEmail" placeholder="E-mail" autocomplete="email">
    <input type="password" id="loginPass" placeholder="Senha" autocomplete="current-password">
    <button class="login-btn" onclick="fazerLogin()">ENTRAR â†’</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div class="dash" id="dashWrap">
  <div class="sidebar">
    <div class="s-logo">NEODONTO</div>
    <div class="s-sub">ADMIN PANEL</div>
    <div class="s-label">Menu</div>
    <button class="s-btn active"><span class="s-icon">ðŸ¦·</span> Pacientes</button>
    <div class="s-spacer"></div>
    <button class="s-logout" onclick="fazerLogout()"><span>ðŸšª</span> Sair</button>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Fichas de Anamnese</div>
      <div class="topbar-right">
        <input type="text" class="search-box" id="searchBox" placeholder="ðŸ” Buscar paciente..." oninput="filtrarPacientes()">
        <button class="refresh-btn" onclick="carregarDados()">â†» Atualizar</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-icon">ðŸ‘¥</div>
        <div class="stat-val" id="totalPacientes">â€”</div>
        <div class="stat-label">Total de pacientes</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">ðŸ“…</div>
        <div class="stat-val" id="totalHoje">â€”</div>
        <div class="stat-label">Fichas hoje</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">âš ï¸</div>
        <div class="stat-val" id="totalAlergias">â€”</div>
        <div class="stat-label">Com alergias</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">ðŸ˜°</div>
        <div class="stat-val" id="totalMedo">â€”</div>
        <div class="stat-label">Com medo/ansiedade</div>
      </div>
    </div>


    <div class="filtros-wrap" id="filtrosWrap">
      <span class="filtros-label">ðŸŽ¯ Filtrar por motivo:</span>
    </div>
    <div class="table-card">
      <div class="table-header">
        <div class="table-title">Todos os Pacientes</div>
        <div class="badge" id="countBadge">0 fichas</div>
      </div>

        <div class="loading"><div class="spinner"></div>Carregando fichas...</div>
      </div>

</div>


<div class="print-area" id="printArea" style="display:none"></div>

<div class="modal-bg" id="modalBg" onclick="fecharModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, getDocs, orderBy, query }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDUJjgEbHToezyzZAMWP5VR1IWHjRF6icM",
    authDomain: "neodonto-808ea.firebaseapp.com",
    projectId: "neodonto-808ea",
    storageBucket: "neodonto-808ea.firebasestorage.app",
    messagingSenderId: "602833895297",
    appId: "1:602833895297:web:6744ea4b28739aced43280"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  let todosPacientes = [];

  onAuthStateChanged(auth, user => {
    if (user) {
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('dashWrap').style.display = 'block';
      carregarDados();
    } else {
      document.getElementById('loginWrap').style.display = 'flex';
      document.getElementById('dashWrap').style.display = 'none';
    }
  });

  window.fazerLogin = async function() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    const err = document.getElementById('loginErr');
    err.textContent = '';
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
      err.textContent = 'E-mail ou senha incorretos.';
    }
  };

  window.fazerLogout = async function() { await signOut(auth); };

  window.carregarDados = async function() {
    document.getElementById('tableArea').innerHTML = `<div class="loading"><div class="spinner"></div>Carregando fichas...</div>`;
    try {
      const q = query(collection(db, 'anamneses'), orderBy('enviadoEm', 'desc'));
      const snap = await getDocs(q);
      todosPacientes = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      renderizar(todosPacientes);
      atualizarStats(todosPacientes);
      gerarFiltrosMotivo();
    } catch(e) {

  let filtroMotivoAtivo = null;

  function gerarFiltrosMotivo() {
    const motivos = {};
    todosPacientes.forEach(p => {
      const m = p.motivoConsulta || 'Outros';
      motivos[m] = (motivos[m] || 0) + 1;
    });

    const wrap = document.getElementById('filtrosWrap');
    const btns = Object.entries(motivos)
      .sort((a, b) => b[1] - a[1])
      .map(([m, count]) =>
        `<button class="filtro-btn" onclick="filtrarMotivo('${m}')">${m}<span class="filtro-count">${count}</span></button>`
      ).join('');

    wrap.innerHTML = `<span class="filtros-label">ðŸŽ¯ Filtrar por motivo:</span>
      <button class="filtro-btn ativo" onclick="filtrarMotivo(null)">Todos <span class="filtro-count">${todosPacientes.length}</span></button>
      ${btns}`;
  }

  window.filtrarMotivo = function(motivo) {
    filtroMotivoAtivo = motivo;
    // Atualizar botÃµes ativos
    document.querySelectorAll('.filtro-btn').forEach(btn => {
      btn.classList.remove('ativo');
      const labelBase = btn.textContent.replace(/\d+/g, '').trim();
      if ((!motivo && labelBase === 'Todos') || labelBase === motivo) {
        btn.classList.add('ativo');

  };

    const q = document.getElementById('searchBox').value.toLowerCase();
    let resultado = todosPacientes.filter(p =>

      (p.dadosPessoais?.telefone || '').includes(q)
    );
    if (filtroMotivoAtivo) {
      resultado = resultado.filter(p => (p.motivoConsulta || 'Outros') === filtroMotivoAtivo);
    }
    renderizar(resultado);
  };

        <div class="m-section"><div class="m-section-title">ðŸ˜° Ansiedade</div><div class="m-tags"><span class="m-tag yellow">${p.ansiedade || 'â€”'}</span></div></div>
        <div class="m-section"><div class="m-section-title">ðŸŒ¿ HÃ¡bitos</div><div class="m-tags">${tagList(p.habitos)}</div></div>

  window.imprimirFicha = function(index) {
    const p = todosPacientes[index];

    const nasc = nascRaw ? nascRaw.split('-').reverse().join('/') : 'â€”';

  window.salvarPDF = function(index) {
    const { jsPDF } = window.jspdf;
    const p = todosPacientes[index];
    const nome = p.dadosPessoais?.nome || 'Paciente';
    const nascRaw = p.dadosPessoais?.nascimento || '';
    const nasc = nascRaw ? nascRaw.split('-').reverse().join('/') : 'â€”';
    const tel = p.dadosPessoais?.telefone || 'â€”';
    const email = p.dadosPessoais?.email || 'â€”';
    const cpf = p.dadosPessoais?.cpf || 'â€”';
    const resp = p.dadosPessoais?.responsavel || 'â€”';
    const data = p.enviadoEm ? new Date(p.enviadoEm.seconds * 1000).toLocaleString('pt-BR') : 'â€”';
    const selfie = p.dadosPessoais?.selfie;
    const temAlergia = p.alergias && p.alergias.length > 0 && !p.alergias.includes('NÃ£o tenho alergias');

    const doc = new jsPDF({ unit: 'mm', format: 'a4' });
    const W = 210;
    let y = 0;

    // CabeÃ§alho
    doc.setFillColor(10, 191, 188);
    doc.rect(0, 0, W, 32, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(22);
    doc.setFont('helvetica', 'bold');
    doc.text('NEODONTO', 14, 14);
    doc.setFontSize(9);
    doc.setFont('helvetica', 'normal');
    doc.text('Ficha de Anamnese', 14, 21);
    doc.text('Enviado em: ' + data, 14, 27);
    y = 42;

    // Foto
    if (selfie) {
      try {
        doc.addImage(selfie, 'JPEG', W - 44, 36, 30, 30, '', 'FAST');
        doc.setDrawColor(10, 191, 188);
        doc.setLineWidth(0.5);
        doc.circle(W - 29, 51, 15);
      } catch(e) {}
    }

    // Dados pessoais
    doc.setTextColor(10, 191, 188);
    doc.setFontSize(11);
    doc.setFont('helvetica', 'bold');
    doc.text('DADOS PESSOAIS', 14, y);
    doc.setDrawColor(10, 191, 188);
    doc.setLineWidth(0.3);
    doc.line(14, y + 2, W - 14, y + 2);
    y += 8;

    doc.setTextColor(50, 50, 50);
    doc.setFontSize(10);
    doc.setFont('helvetica', 'bold');
    doc.text('Nome:', 14, y);
    doc.setFont('helvetica', 'normal');
    doc.text(nome, 40, y);
    y += 6;

    doc.setFont('helvetica', 'bold');
    doc.text('Nascimento:', 14, y);
    doc.setFont('helvetica', 'normal');
    doc.text(nasc, 40, y);
    doc.setFont('helvetica', 'bold');
    doc.text('CPF:', 100, y);
    doc.setFont('helvetica', 'normal');
    doc.text(cpf, 115, y);
    y += 6;

    doc.setFont('helvetica', 'bold');
    doc.text('Telefone:', 14, y);
    doc.setFont('helvetica', 'normal');
    doc.text(tel, 40, y);
    y += 6;

    doc.setFont('helvetica', 'bold');
    doc.text('E-mail:', 14, y);
    doc.setFont('helvetica', 'normal');
    doc.text(email, 40, y);
    y += 6;

    if (resp && resp !== 'â€”') {
      doc.setFont('helvetica', 'bold');
      doc.text('ResponsÃ¡vel:', 14, y);
      doc.setFont('helvetica', 'normal');
      doc.text(resp, 40, y);
      y += 6;
    }
    y += 4;

    // FunÃ§Ã£o para seÃ§Ã£o
    function secao(titulo, itens, corFundo) {
      if (y > 260) { doc.addPage(); y = 20; }
      doc.setTextColor(10, 191, 188);
      doc.setFontSize(10);
      doc.setFont('helvetica', 'bold');
      doc.text(titulo, 14, y);
      doc.line(14, y + 2, W - 14, y + 2);
      y += 7;
      doc.setTextColor(50, 50, 50);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);

      if (!itens || itens.length === 0 || (itens.length === 1 && !itens[0])) {
        doc.setTextColor(150, 150, 150);
        doc.text('Nenhum informado', 14, y);
        y += 6;
      } else {
        let x = 14;
        itens.forEach(item => {
          if (!item) return;
          const w = doc.getTextWidth(item) + 8;
          if (x + w > W - 14) { x = 14; y += 7; }
          if (y > 270) { doc.addPage(); y = 20; x = 14; }
          if (corFundo) {
            doc.setFillColor(...corFundo);
            doc.roundedRect(x, y - 4, w, 6, 1, 1, 'F');
          }
          doc.setTextColor(50, 50, 50);
          doc.text(item, x + 4, y);
          x += w + 4;
        });
        y += 8;
      }
      y += 2;
    }

    secao('MOTIVO DA CONSULTA', [p.motivoConsulta], [220, 252, 231]);
    secao('SAÃšDE GERAL', p.saudeGeral, [240, 240, 240]);
    secao(temAlergia ? 'âš  ALERGIAS' : 'ALERGIAS', p.alergias, temAlergia ? [254, 226, 226] : [240, 240, 240]);
    secao('MEDICAMENTOS', p.medicamentos, [254, 243, 199]);
    secao('SAÃšDE BUCAL', p.saudeBucal, [240, 240, 240]);
    secao('ANSIEDADE', [p.ansiedade], [240, 240, 240]);
    secao('HÃBITOS', p.habitos, [240, 240, 240]);

    if (y > 240) { doc.addPage(); y = 20; }
    doc.setDrawColor(200, 200, 200);
    doc.line(14, y, W - 14, y);
    y += 6;

    secao('TIME / PREFERÃŠNCIAS', [
      p.timeFutebol ? 'âš½ ' + p.timeFutebol : null,
      ...(p.musica || []),
      ...(p.filmes || []),
      ...(p.lazer || [])
    ].filter(Boolean), [240, 240, 240]);

    // RodapÃ©
    const pages = doc.getNumberOfPages();
    for (let i = 1; i <= pages; i++) {
      doc.setPage(i);
      doc.setFontSize(8);
      doc.setTextColor(180, 180, 180);
      doc.text('NEODONTO â€” Gerado em ' + new Date().toLocaleString('pt-BR'), 14, 290);
      doc.text('PÃ¡gina ' + i + ' de ' + pages, W - 30, 290);
    }

    doc.save('anamnese-' + nome.split(' ')[0].toLowerCase() + '.pdf');
  };

  window.fecharModal = function(e) {
    if (!e || e.target === document.getElementById('modalBg')) {
      document.getElementById('modalBg').classList.remove('open');
    }
  };

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('loginWrap').style.display !== 'none') {
      window.fazerLogin();
    }
  });
</script>
