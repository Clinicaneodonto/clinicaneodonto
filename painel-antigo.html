<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Admin — NEODONTO</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --teal: #0ABFBC;
  --teal2: #0891B2;
  --navy: #0A1628;
  --card: #111E30;
  --card2: #162236;
  --border: rgba(10,191,188,0.15);
  --text: #E8F4F8;
  --muted: #6A8FA8;
  --danger: #FF5C7A;
  --warn: #F5A623;
  --green: #2ECC71;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--navy);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  min-height: 100vh;
}

/* LOGIN */
.login-wrap {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: radial-gradient(ellipse at 30% 20%, rgba(10,191,188,0.08) 0%, transparent 60%),
              radial-gradient(ellipse at 80% 80%, rgba(8,145,178,0.06) 0%, transparent 50%),
              var(--navy);
}
.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 40px 32px;
  width: 100%;
  max-width: 380px;
  text-align: center;
}
.login-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.8rem;
  letter-spacing: 3px;
  color: var(--teal);
  margin-bottom: 4px;
}
.login-sub { font-size: 0.8rem; color: var(--muted); letter-spacing: 1px; margin-bottom: 32px; }
.login-card input {
  width: 100%;
  background: rgba(10,191,188,0.05);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.95rem;
  margin-bottom: 12px;
  outline: none;
  transition: border-color 0.2s;
}
.login-card input:focus { border-color: var(--teal); }
.login-card input::placeholder { color: var(--muted); }
.login-btn {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, var(--teal), var(--teal2));
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: 'Syne', sans-serif;
  font-size: 0.95rem;
  font-weight: 700;
  letter-spacing: 1px;
  cursor: pointer;
  transition: opacity 0.2s;
}
.login-btn:hover { opacity: 0.88; }
.login-err { color: var(--danger); font-size: 0.82rem; margin-top: 10px; }

/* DASHBOARD */
.dash { display: none; min-height: 100vh; }

.sidebar {
  position: fixed;
  top: 0; left: 0;
  width: 220px;
  height: 100vh;
  background: var(--card);
  border-right: 1px solid var(--border);
  padding: 28px 16px;
  z-index: 100;
  display: flex;
  flex-direction: column;
}
.s-logo {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.3rem;
  letter-spacing: 2px;
  color: var(--teal);
  margin-bottom: 2px;
  padding: 0 8px;
}
.s-sub { font-size: 0.7rem; color: var(--muted); padding: 0 8px; margin-bottom: 28px; letter-spacing: 1px; }
.s-label { font-size: 0.65rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; padding: 0 8px; margin-bottom: 8px; }
.s-btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 0.88rem;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 4px;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
}
.s-btn:hover, .s-btn.active { background: rgba(10,191,188,0.1); color: var(--text); }
.s-btn.active { color: var(--teal); }
.s-icon { font-size: 1rem; width: 20px; text-align: center; }
.s-spacer { flex: 1; }
.s-logout {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 0.85rem;
  color: var(--danger);
  cursor: pointer;
  border: none; background: none; width: 100%;
}
.s-logout:hover { background: rgba(255,92,122,0.08); }

.main { margin-left: 220px; padding: 28px 24px; min-height: 100vh; }

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
}
.topbar-title { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 700; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.search-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 0.88rem;
  outline: none;
  width: 220px;
  transition: border-color 0.2s;
}
.search-box:focus { border-color: var(--teal); }
.search-box::placeholder { color: var(--muted); }
.refresh-btn {
  background: rgba(10,191,188,0.1);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  color: var(--teal);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.2s;
}
.refresh-btn:hover { background: rgba(10,191,188,0.2); }

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
.stat-card::before {
  content: '';
  position: absolute;
  top: -20px; right: -20px;
  width: 80px; height: 80px;
  border-radius: 50%;
  background: rgba(10,191,188,0.06);
}
.stat-icon { font-size: 1.4rem; margin-bottom: 12px; }
.stat-val {
  font-family: 'Syne', sans-serif;
  font-size: 2rem;
  font-weight: 800;
  color: var(--teal);
  line-height: 1;
}
.stat-label { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

.table-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
}
.table-header {
  padding: 18px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.table-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem; }
.badge {
  background: rgba(10,191,188,0.12);
  color: var(--teal);
  border-radius: 99px;
  padding: 3px 10px;
  font-size: 0.75rem;
  font-weight: 600;
}

table { width: 100%; border-collapse: collapse; }
thead th {
  padding: 12px 16px;
  font-size: 0.72rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  font-weight: 500;
}
tbody tr {
  border-bottom: 1px solid rgba(10,191,188,0.06);
  transition: background 0.15s;
  cursor: pointer;
}
tbody tr:hover { background: rgba(10,191,188,0.04); }
tbody tr:last-child { border-bottom: none; }
td { padding: 13px 16px; font-size: 0.88rem; vertical-align: middle; }
.td-name { font-weight: 500; color: var(--text); }
.td-muted { color: var(--muted); font-size: 0.82rem; }
.td-tag {
  display: inline-block;
  background: rgba(10,191,188,0.1);
  color: var(--teal);
  border-radius: 6px;
  padding: 2px 8px;
  font-size: 0.75rem;
  margin: 2px;
}
.td-tag.warn { background: rgba(245,166,35,0.12); color: var(--warn); }
.td-tag.danger { background: rgba(255,92,122,0.1); color: var(--danger); }
.view-btn {
  background: rgba(10,191,188,0.1);
  border: none;
  border-radius: 8px;
  padding: 6px 12px;
  color: var(--teal);
  font-size: 0.8rem;
  cursor: pointer;
  transition: all 0.2s;
}
.view-btn:hover { background: rgba(10,191,188,0.2); }

.loading { text-align: center; padding: 60px; color: var(--muted); font-size: 0.9rem; }
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--teal);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  padding: 20px;
  overflow-y: auto;
  backdrop-filter: blur(4px);
}
.modal-bg.open { display: flex; align-items: flex-start; justify-content: center; padding-top: 40px; }
.modal {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  width: 100%;
  max-width: 600px;
  overflow: hidden;
  animation: modalIn 0.3s ease;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(-20px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-head {
  background: linear-gradient(135deg, var(--teal), var(--teal2));
  padding: 24px;
  position: relative;
}
.modal-name { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 700; color: #fff; }
.modal-date { font-size: 0.8rem; color: rgba(255,255,255,0.7); margin-top: 4px; }
.modal-close {
  position: absolute;
  top: 16px; right: 16px;
  background: rgba(255,255,255,0.15);
  border: none;
  border-radius: 8px;
  width: 32px; height: 32px;
  color: #fff;
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.modal-body { padding: 24px; }
.m-section { margin-bottom: 20px; }
.m-section-title {
  font-size: 0.72rem;
  color: var(--teal);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 600;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.m-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.m-tag {
  background: rgba(10,191,188,0.08);
  border: 1px solid rgba(10,191,188,0.15);
  color: var(--text);
  border-radius: 8px;
  padding: 4px 10px;
  font-size: 0.82rem;
}
.m-tag.red { background: rgba(255,92,122,0.08); border-color: rgba(255,92,122,0.2); color: var(--danger); }
.m-tag.yellow { background: rgba(245,166,35,0.08); border-color: rgba(245,166,35,0.2); color: var(--warn); }
.m-tag.green { background: rgba(46,204,113,0.08); border-color: rgba(46,204,113,0.2); color: var(--green); }
.m-empty { color: var(--muted); font-size: 0.85rem; font-style: italic; }

.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
.empty h3 { font-family: 'Syne', sans-serif; font-size: 1rem; color: var(--text); margin-bottom: 6px; }
.empty p { font-size: 0.85rem; }

/* Foto paciente */
.avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--border);
  background: var(--card2);
  flex-shrink: 0;
}
.avatar-placeholder {
  width: 38px; height: 38px;
  border-radius: 50%;
  background: var(--card2);
  border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
}
.td-paciente { display: flex; align-items: center; gap: 10px; }

/* Foto grande no modal */
.modal-avatar {
  width: 80px; height: 80px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.1);
  position: absolute;
  top: 20px; right: 20px;
}
.modal-avatar-placeholder {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: 3px solid rgba(255,255,255,0.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem;
  position: absolute;
  top: 20px; right: 20px;
}

@media (max-width: 768px) {
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 16px; }
  .stats { grid-template-columns: 1fr 1fr; }
  .search-box { width: 150px; }
}
</style>
</head>
<body>

<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-logo">NEODONTO</div>
    <div class="login-sub">PAINEL ADMINISTRATIVO</div>
    <input type="email" id="loginEmail" placeholder="E-mail" autocomplete="email">
    <input type="password" id="loginPass" placeholder="Senha" autocomplete="current-password">
    <button class="login-btn" onclick="fazerLogin()">ENTRAR →</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<div class="dash" id="dashWrap">
  <div class="sidebar">
    <div class="s-logo">NEODONTO</div>
    <div class="s-sub">ADMIN PANEL</div>
    <div class="s-label">Menu</div>
    <button class="s-btn active"><span class="s-icon">🦷</span> Pacientes</button>
    <div class="s-spacer"></div>
    <button class="s-logout" onclick="fazerLogout()"><span>🚪</span> Sair</button>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="topbar-title">Fichas de Anamnese</div>
      <div class="topbar-right">
        <input type="text" class="search-box" id="searchBox" placeholder="🔍 Buscar paciente..." oninput="filtrarPacientes()">
        <button class="refresh-btn" onclick="carregarDados()">↻ Atualizar</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-val" id="totalPacientes">—</div>
        <div class="stat-label">Total de pacientes</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📅</div>
        <div class="stat-val" id="totalHoje">—</div>
        <div class="stat-label">Fichas hoje</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">⚠️</div>
        <div class="stat-val" id="totalAlergias">—</div>
        <div class="stat-label">Com alergias</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">😰</div>
        <div class="stat-val" id="totalMedo">—</div>
        <div class="stat-label">Com medo/ansiedade</div>
      </div>
    </div>

    <div class="table-card">
      <div class="table-header">
        <div class="table-title">Todos os Pacientes</div>
        <div class="badge" id="countBadge">0 fichas</div>
      </div>
      <div id="tableArea">
        <div class="loading"><div class="spinner"></div>Carregando fichas...</div>
      </div>
    </div>
  </div>
</div>

<div class="modal-bg" id="modalBg" onclick="fecharModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, getDocs, orderBy, query }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDUJjgEbHToezyzZAMWP5VR1IWHjRF6icM",
    authDomain: "neodonto-808ea.firebaseapp.com",
    projectId: "neodonto-808ea",
    storageBucket: "neodonto-808ea.firebasestorage.app",
    messagingSenderId: "602833895297",
    appId: "1:602833895297:web:6744ea4b28739aced43280"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  let todosPacientes = [];

  onAuthStateChanged(auth, user => {
    if (user) {
      document.getElementById('loginWrap').style.display = 'none';
      document.getElementById('dashWrap').style.display = 'block';
      carregarDados();
    } else {
      document.getElementById('loginWrap').style.display = 'flex';
      document.getElementById('dashWrap').style.display = 'none';
    }
  });

  window.fazerLogin = async function() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    const err = document.getElementById('loginErr');
    err.textContent = '';
    try {
      await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
      err.textContent = 'E-mail ou senha incorretos.';
    }
  };

  window.fazerLogout = async function() { await signOut(auth); };

  window.carregarDados = async function() {
    document.getElementById('tableArea').innerHTML = `<div class="loading"><div class="spinner"></div>Carregando fichas...</div>`;
    try {
      const q = query(collection(db, 'anamneses'), orderBy('enviadoEm', 'desc'));
      const snap = await getDocs(q);
      todosPacientes = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      renderizar(todosPacientes);
      atualizarStats(todosPacientes);
    } catch(e) {
      document.getElementById('tableArea').innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><h3>Erro ao carregar</h3><p>Verifique as regras do Firestore.</p></div>`;
    }
  };

  function atualizarStats(lista) {
    document.getElementById('totalPacientes').textContent = lista.length;
    const hoje = new Date().toDateString();
    document.getElementById('totalHoje').textContent = lista.filter(p => p.enviadoEm && new Date(p.enviadoEm.seconds * 1000).toDateString() === hoje).length;
    document.getElementById('totalAlergias').textContent = lista.filter(p => p.alergias && p.alergias.length > 0 && !p.alergias.includes('Não tenho alergias')).length;
    document.getElementById('totalMedo').textContent = lista.filter(p => p.ansiedade && (p.ansiedade.includes('ansioso') || p.ansiedade.includes('medo') || p.ansiedade.includes('Fobia'))).length;
  }

  function renderizar(lista) {
    document.getElementById('countBadge').textContent = `${lista.length} fichas`;
    if (lista.length === 0) {
      document.getElementById('tableArea').innerHTML = `<div class="empty"><div class="empty-icon">📋</div><h3>Nenhuma ficha encontrada</h3><p>As fichas preenchidas pelos pacientes aparecerão aqui.</p></div>`;
      return;
    }
    const rows = lista.map((p, i) => {
      const nome = p.dadosPessoais?.nome || '—';
      const tel = p.dadosPessoais?.telefone || '—';
      const motivo = p.motivoConsulta || '—';
      const data = p.enviadoEm ? new Date(p.enviadoEm.seconds * 1000).toLocaleDateString('pt-BR') : '—';
      const temAlergia = p.alergias && p.alergias.length > 0 && !p.alergias.includes('Não tenho alergias');
    const fotoModal = p.dadosPessoais?.selfie
      ? `<img class="modal-avatar" src="${p.dadosPessoais.selfie}" alt="Foto" />`
      : `<div class="modal-avatar-placeholder">🦷</div>`;
      const temMedo = p.ansiedade && (p.ansiedade.includes('ansioso') || p.ansiedade.includes('medo') || p.ansiedade.includes('Fobia'));
      const selfie = p.dadosPessoais?.selfie;
      const avatarHtml = selfie ? `<img class="avatar" src="${selfie}" alt="Foto" />` : `<div class="avatar-placeholder">🦷</div>`;
      return `<tr onclick="abrirModal(${i})">
        <td><div class="td-paciente">${avatarHtml}<div class="td-name">${nome}</div></div></td>
        <td><div class="td-muted">${tel}</div></td>
        <td><span class="td-tag">${motivo}</span></td>
        <td>
          ${temAlergia ? '<span class="td-tag danger">⚠️ Alergia</span>' : ''}
          ${temMedo ? '<span class="td-tag warn">😰 Ansioso</span>' : ''}
          ${!temAlergia && !temMedo ? '<span class="td-tag">✅ Ok</span>' : ''}
        </td>
        <td><div class="td-muted">${p.timeFutebol || '—'}</div></td>
        <td><div class="td-muted">${data}</div></td>
        <td><button class="view-btn">Ver ficha</button></td>
      </tr>`;
    }).join('');

    document.getElementById('tableArea').innerHTML = `
      <table>
        <thead><tr>
          <th>Paciente</th><th>Telefone</th><th>Motivo</th>
          <th>Alertas</th><th>Time ⚽</th><th>Data</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  window.filtrarPacientes = function() {
    const q = document.getElementById('searchBox').value.toLowerCase();
    renderizar(todosPacientes.filter(p =>
      (p.dadosPessoais?.nome || '').toLowerCase().includes(q) ||
      (p.dadosPessoais?.telefone || '').includes(q)
    ));
  };

  window.abrirModal = function(index) {
    const p = todosPacientes[index];
    const nome = p.dadosPessoais?.nome || '—';
    const nasc = p.dadosPessoais?.nascimento || '—';
    const tel = p.dadosPessoais?.telefone || '—';
    const data = p.enviadoEm ? new Date(p.enviadoEm.seconds * 1000).toLocaleString('pt-BR') : '—';

    function tagList(arr, cls='') {
      if (!arr || arr.length === 0) return `<span class="m-empty">Nenhum informado</span>`;
      return arr.map(t => `<span class="m-tag ${cls}">${t}</span>`).join('');
    }

    const temAlergia = p.alergias && p.alergias.length > 0 && !p.alergias.includes('Não tenho alergias');
    const fotoModal = p.dadosPessoais?.selfie
      ? `<img class="modal-avatar" src="${p.dadosPessoais.selfie}" alt="Foto" />`
      : `<div class="modal-avatar-placeholder">🦷</div>`;

    document.getElementById('modalContent').innerHTML = `
      <div class="modal-head">
        <div class="modal-name">🦷 ${nome}</div>
        <div class="modal-date">📅 Nascimento: ${nasc} &nbsp;|&nbsp; 📞 ${tel}</div>
        <div class="modal-date" style="margin-top:4px">⏱ Enviado em: ${data}</div>
        ${fotoModal}
        <button class="modal-close" onclick="fecharModal()">✕</button>
      </div>
      <div class="modal-body">
        <div class="m-section"><div class="m-section-title">🎯 Motivo</div><div class="m-tags"><span class="m-tag green">${p.motivoConsulta || '—'}</span></div></div>
        <div class="m-section"><div class="m-section-title">❤️ Saúde Geral</div><div class="m-tags">${tagList(p.saudeGeral)}</div></div>
        <div class="m-section"><div class="m-section-title">⚠️ Alergias</div><div class="m-tags">${tagList(p.alergias, temAlergia ? 'red' : '')}</div></div>
        <div class="m-section"><div class="m-section-title">💊 Medicamentos</div><div class="m-tags">${tagList(p.medicamentos, 'yellow')}</div></div>
        <div class="m-section"><div class="m-section-title">🦷 Saúde Bucal</div><div class="m-tags">${tagList(p.saudeBucal)}</div></div>
        <div class="m-section"><div class="m-section-title">😰 Ansiedade</div><div class="m-tags"><span class="m-tag yellow">${p.ansiedade || '—'}</span></div></div>
        <div class="m-section"><div class="m-section-title">🌿 Hábitos</div><div class="m-tags">${tagList(p.habitos)}</div></div>
        <div style="border-top:1px solid var(--border);margin:16px 0"></div>
        <div class="m-section"><div class="m-section-title">⚽ Time</div><div class="m-tags"><span class="m-tag">${p.timeFutebol || '—'}</span></div></div>
        <div class="m-section"><div class="m-section-title">🎵 Música</div><div class="m-tags">${tagList(p.musica)}</div></div>
        <div class="m-section"><div class="m-section-title">🎬 Filmes</div><div class="m-tags">${tagList(p.filmes)}</div></div>
        <div class="m-section"><div class="m-section-title">🌴 Lazer</div><div class="m-tags">${tagList(p.lazer)}</div></div>
      </div>`;

    document.getElementById('modalBg').classList.add('open');
  };

  window.fecharModal = function(e) {
    if (!e || e.target === document.getElementById('modalBg')) {
      document.getElementById('modalBg').classList.remove('open');
    }
  };

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('loginWrap').style.display !== 'none') {
      window.fazerLogin();
    }
  });
</script>
</body>
</html>
